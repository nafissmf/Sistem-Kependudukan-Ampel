# =================================================================
# Docker Compose — PRODUCTION-STYLE (Phase 9)
# =================================================================
# Beda dengan docker-compose.yml (yang cuma MySQL+phpMyAdmin untuk dev
# lokal), file ini menjalankan STACK LENGKAP: app (PHP-FPM), Nginx,
# MySQL, Redis, dan queue worker — mendekati setup production sungguhan.
#
# Pakai:
#   cp .env.example .env   # lalu sesuaikan DB_HOST=mysql, REDIS_HOST=redis
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec app php artisan migrate --seed

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sik-ampel-app
    restart: unless-stopped
    volumes:
      - storage_data:/var/www/html/storage/app/public
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sik-ampel-queue
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --sleep=3
    volumes:
      - storage_data:/var/www/html/storage/app/public
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: sik-ampel-nginx
    restart: unless-stopped
    ports:
      - '8000:80'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/var/www/html/storage/app/public:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: sik-ampel-prod-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sik_ampel
    volumes:
      - mysql_prod_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sik-ampel-redis
    restart: unless-stopped

volumes:
  mysql_prod_data:
  storage_data:
