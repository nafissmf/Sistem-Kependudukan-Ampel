name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, mysql, zip, gd, intl, bcmath
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate app key
        run: php artisan key:generate

      - name: Code style check (Pint)
        run: ./vendor/bin/pint --test

      - name: Run tests (SQLite in-memory, lebih cepat untuk CI)
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan test

      - name: Build frontend assets
        run: npm run build

  deploy:
    name: Deploy (placeholder)
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deployment placeholder
        run: |
          echo "Quality checks lulus di branch main."
          echo "Tambahkan step deploy sungguhan di sini sesuai target hosting:"
          echo "  - VPS/Ubuntu: SSH + git pull + composer install + migrate + queue:restart"
          echo "  - Platform PaaS (Laravel Forge/Vapor/Railway/dst): pakai action resminya"
          echo "Tidak dijalankan otomatis karena belum ada target/secret deployment yang dikonfigurasi."
